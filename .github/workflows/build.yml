name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed for release uploads on tags

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: vet
        run: go vet ./...
      - name: gofmt
        run: |
          test -z "$(gofmt -l .)"
      - name: test
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # for `git describe`
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build linux/${{ matrix.goarch }}
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=$GOARCH \
            go build -trimpath \
            -ldflags "-s -w -X main.Version=$(git describe --tags --always --dirty)" \
            -o build/zerolink-backend-linux-$GOARCH .
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zerolink-backend-linux-${{ matrix.goarch }}
          path: build/zerolink-backend-linux-${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: zerolink-backend-linux-*
          merge-multiple: true
      - name: checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          ls -la
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zerolink-backend-linux-amd64
            dist/zerolink-backend-linux-arm64
            dist/SHA256SUMS
          generate_release_notes: true
