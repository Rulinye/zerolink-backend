name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt diff:"
            echo "$out"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -race -count=1

  build:
    needs: test
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build linux/${{ matrix.arch }}
        run: make linux-${{ matrix.arch }} VERSION=${GITHUB_REF_NAME}

      - name: list build output
        run: ls -la bin/

      - name: verify all four binaries exist
        run: |
          for name in zerolink-backend zerolink-backend-admin-create zerolink-backend-import-nodes zerolink-backend-gen-service-token; do
            file="bin/${name}-linux-${{ matrix.arch }}"
            if [ ! -f "$file" ]; then
              echo "MISSING: $file"
              exit 1
            fi
            echo "OK: $file ($(stat -c%s "$file") bytes)"
          done

      - name: checksum
        working-directory: bin
        run: sha256sum *-linux-${{ matrix.arch }} > SHA256SUMS-${{ matrix.arch }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            bin/zerolink-backend-linux-${{ matrix.arch }}
            bin/zerolink-backend-admin-create-linux-${{ matrix.arch }}
            bin/zerolink-backend-import-nodes-linux-${{ matrix.arch }}
            bin/zerolink-backend-gen-service-token-linux-${{ matrix.arch }}
            bin/SHA256SUMS-${{ matrix.arch }}.txt
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dl
      - name: flatten
        run: |
          mkdir -p release
          find dl -type f -exec cp {} release/ \;
          ls -la release/
      - name: verify all 10 expected files present
        run: |
          set -e
          for f in \
            zerolink-backend-linux-amd64 \
            zerolink-backend-linux-arm64 \
            zerolink-backend-admin-create-linux-amd64 \
            zerolink-backend-admin-create-linux-arm64 \
            zerolink-backend-import-nodes-linux-amd64 \
            zerolink-backend-import-nodes-linux-arm64 \
            zerolink-backend-gen-service-token-linux-amd64 \
            zerolink-backend-gen-service-token-linux-arm64 \
            SHA256SUMS-amd64.txt \
            SHA256SUMS-arm64.txt
          do
            test -f "release/$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "all 10 files present"
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
