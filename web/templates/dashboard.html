<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>zerolink admin · dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body>
  <nav class="topnav">
    <span class="brand">zerolink</span>
    <a href="/admin/">dashboard</a>
    <a href="/admin/invites">invites</a>
    <a href="/admin/users">users</a>
    <a href="/admin/nodes">nodes</a>
    <a class="right" href="/admin/logout">logout</a>
  </nav>
  <main>
    <h1>dashboard</h1>
    <section class="cards">
      <div class="card">
        <div class="num">{{ .UserCount }}</div>
        <div class="lbl">users</div>
      </div>
      <div class="card">
        <div class="num">{{ .UnusedInvites }}</div>
        <div class="lbl">unused invites</div>
      </div>
      <div class="card">
        <div class="num">{{ .NodeCount }}</div>
        <div class="lbl">nodes</div>
      </div>
    </section>
    <p class="muted">Phase 1 admin UI. For programmatic access use <code>POST /api/v1/auth/login</code>.</p>
  </main>
</body>
</html>
