<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>zerolink admin · login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
  <main class="login-card">
    <h1>zerolink admin</h1>
    {{ if .Error }}
    <p class="err">{{ .Error }}</p>
    {{ end }}
    <form method="post" action="/admin/login">
      <label>
        username
        <input name="username" type="text" autocomplete="username" autofocus required>
      </label>
      <label>
        password
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">log in</button>
    </form>
    <p class="hint">First-time setup? Run <code>zerolink-backend admin create -u &lt;name&gt;</code> on the server.</p>
  </main>
</body>
</html>
